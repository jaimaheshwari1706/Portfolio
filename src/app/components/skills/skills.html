<section id="experience" class="py-28 px-6 bg-[#0b1020] text-white relative overflow-hidden">
  <!-- Glow Background -->
  <div class="absolute top-0 left-0 w-[400px] h-[400px] bg-pink-500/20 blur-[120px] rounded-full"></div>
  <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-blue-500/20 blur-[120px] rounded-full"></div>

  <!-- Heading -->
  <h2
    class="text-5xl md:text-6xl font-extrabold mb-16 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-blue-400 text-center tracking-wide"
    data-aos="fade-up"
  >
    Experience
  </h2>

  <!-- Timeline Container -->
  <div class="relative max-w-6xl mx-auto space-y-12" data-aos="fade-up">

    <!-- Experience Item -->
    <div *ngFor="let exp of experiences" class="relative pl-10 border-l-4 border-pink-500 group hover:border-blue-400 transition duration-500">
      <div class="absolute -left-5 top-2 w-6 h-6 bg-gradient-to-r from-pink-500 to-blue-400 rounded-full shadow-lg group-hover:scale-110 transition-transform duration-500"></div>

      <!-- Header -->
      <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-3">
        <h3 class="text-2xl font-bold text-white">{{ exp.title }}</h3>
        <span class="text-sm text-gray-400 italic">{{ exp.duration }}</span>
      </div>

      <!-- Company -->
      <p class="text-pink-400 text-lg font-semibold mb-4">{{ exp.company }}</p>

      <!-- Description -->
      <ul class="space-y-3 text-gray-300 text-base leading-relaxed">
        <li *ngFor="let point of exp.points" class="flex items-start gap-2">
          <span class="text-blue-400 mt-[3px]">▹</span> {{ point }}
        </li>
      </ul>

      <!-- Technologies -->
      <div class="mt-5 flex flex-wrap gap-3">
        <span *ngFor="let tech of exp.techStack" class="px-3 py-1 text-sm bg-white/10 border border-white/10 rounded-full text-gray-300">
          {{ tech }}
        </span>
      </div>
    </div>
  </div>
</section>
